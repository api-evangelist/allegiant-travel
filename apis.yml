description: >-
  Allegiant Travel Company is a leisure-focused U.S. airline holding company and
  a Fortune 1000 firm operating Allegiant Air, which provides low-cost, mostly
  nonstop flights between underserved cities and popular leisure destinations.
  The company also bundles air travel with hotels, rental cars, and event
  tickets through its allegiant.com booking platform. Allegiant does not publish
  a public developer portal or external API.
